{% extends "base.html" %}

{% block title %}Login - TuneFlow{% endblock %}

{% block content %}
<div class="auth-container">
    <div class="auth-card">
        <h1>Welcome Back</h1>
        <p class="auth-subtitle">Login to continue</p>

        <form method="post" class="auth-form">
            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" name="email" required autofocus>
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" required>
            </div>
            <button type="submit" class="btn-primary">Login</button>
        </form>

        <div class="auth-footer">
            Don't have an account? <a href="{{ url_for('frontend.register') }}">Sign up</a>
        </div>
    </div>
</div>

<style>
.auth-container {
    min-height: 80vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
}
.auth-card {
    max-width: 400px;
    width: 100%;
    background: var(--bg-secondary);
    border-radius: 24px;
    padding: 32px;
    box-shadow: var(--shadow-md);
}
.auth-card h1 {
    font-size: 1.8rem;
    margin-bottom: 8px;
}
.auth-subtitle {
    color: var(--text-secondary);
    margin-bottom: 24px;
}
.auth-form {
    display: flex;
    flex-direction: column;
    gap: 20px;
}
.form-group {
    display: flex;
    flex-direction: column;
    gap: 8px;
}
.form-group label {
    font-weight: 500;
}
.form-group input {
    padding: 12px;
    border: 1px solid var(--border-color);
    border-radius: 12px;
    background: var(--bg-primary);
    color: var(--text-primary);
    font-size: 1rem;
}
.form-group input:focus {
    outline: none;
    border-color: var(--accent-color);
}
.btn-primary {
    background: var(--accent-color);
    color: white;
    border: none;
    padding: 12px;
    border-radius: 40px;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.2s;
}
.btn-primary:hover {
    background: var(--accent-hover);
}
.auth-footer {
    text-align: center;
    margin-top: 24px;
    font-size: 0.9rem;
    color: var(--text-secondary);
}
.auth-footer a {
    color: var(--accent-color);
    text-decoration: none;
}
</style>
{% endblock %}
